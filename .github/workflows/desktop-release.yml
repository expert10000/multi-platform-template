name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:desktop:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            release/desktop/*.exe
            release/desktop/*.blockmap
            release/desktop/latest.yml
          if-no-files-found: error

  build-linux:
    name: Build Linux packages
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fakeroot file libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run package:desktop:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            release/desktop/*.AppImage
            release/desktop/*.deb
            release/desktop/*.rpm
            release/desktop/*.blockmap
            release/desktop/latest-linux.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
