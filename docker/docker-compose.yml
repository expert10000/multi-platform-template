services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "8080:80"
    restart: unless-stopped

  worker-kpi-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command:
      - --job
      - kpi
      - --input
      - sample-data/online-retail.csv
      - --output
      - reports/kpi-analysis.json
    volumes:
      - ../reports:/app/reports
